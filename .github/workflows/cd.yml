name: CD - Main Branch

on:
  workflow_run:
    workflows: ["CI/CD - Main Branch"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: notification-api-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
    permissions:
      contents: read
      packages: write
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/undercontroll-inc/notification-api:latest
            ghcr.io/undercontroll-inc/notification-api:${{ env.IMAGE_TAG }}

  deploy:
    name: Deploy to EC2
    needs: publish
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
    permissions:
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy via SSM
        env:
          BACKEND_INSTANCE_ID: ${{ vars.BACKEND_INSTANCE_ID != '' && vars.BACKEND_INSTANCE_ID || secrets.BACKEND_INSTANCE_ID }}
          DB_HOST: ${{ vars.DB_HOST != '' && vars.DB_HOST || secrets.DB_HOST }}
          RABBITMQ_HOST: ${{ vars.RABBITMQ_HOST != '' && vars.RABBITMQ_HOST || secrets.RABBITMQ_HOST }}
        run: |
          set -euo pipefail
          INSTANCE_ID="${BACKEND_INSTANCE_ID}"
          REGION="us-east-1"

          if [ -z "$INSTANCE_ID" ]; then
            echo "BACKEND_INSTANCE_ID secret is empty." >&2
            exit 1
          fi

          INSTANCE_STATE=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --region "$REGION" \
            --query "Reservations[0].Instances[0].State.Name" \
            --output text 2>/dev/null || true)

          if [ -z "$INSTANCE_STATE" ] || [ "$INSTANCE_STATE" = "None" ] || [ "$INSTANCE_STATE" = "terminated" ]; then
            echo "Instance '$INSTANCE_ID' not found in account/region '$REGION'. Check BACKEND_INSTANCE_ID and AWS credentials." >&2
            exit 1
          fi

          if [ "$INSTANCE_STATE" != "running" ]; then
            echo "Instance '$INSTANCE_ID' is in state '$INSTANCE_STATE'. Start it before deploy." >&2
            exit 1
          fi

          SSM_PING_STATUS=$(aws ssm describe-instance-information \
            --region "$REGION" \
            --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
            --query "InstanceInformationList[0].PingStatus" \
            --output text 2>/dev/null || true)

          if [ "$SSM_PING_STATUS" != "Online" ]; then
            echo "Instance '$INSTANCE_ID' is not Online in SSM (status: '$SSM_PING_STATUS'). Check IAM role and SSM agent." >&2
            exit 1
          fi

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy notification-api ${{ env.IMAGE_TAG }}" \
            --timeout-seconds 300 \
            --parameters 'commands=[
              "set -e",
              "echo ${{ secrets.GH_PAT }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin",
              "mkdir -p /opt/app",
              "cat > /opt/app/.env << '\''EOF'\''",
              "DB_HOST=${{ env.DB_HOST }}",
              "DB_USERNAME=${{ secrets.DB_USERNAME }}",
              "DB_PASSWORD=${{ secrets.DB_PASSWORD }}",
              "RABBITMQ_HOST=${{ env.RABBITMQ_HOST }}",
              "RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}",
              "RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}",
              "JWT_SECRET=${{ secrets.JWT_SECRET }}",
              "MAIL_HOST=${{ secrets.MAIL_HOST }}",
              "MAIL_PORT=${{ secrets.MAIL_PORT }}",
              "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}",
              "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}",
              "EOF",
              "chmod 600 /opt/app/.env",
              "curl -fsSL -H '\''Authorization: token ${{ secrets.GH_PAT }}'\'' -H '\''Accept: application/vnd.github.v3.raw'\'' https://api.github.com/repos/undercontroll-inc/infra/contents/docker-compose.prod.yml -o /opt/app/docker-compose.yml",
              "sed -i '\''s|ghcr.io/undercontroll-inc/notification-api:latest|ghcr.io/undercontroll-inc/notification-api:${{ env.IMAGE_TAG }}|g'\'' /opt/app/docker-compose.yml",
              "mkdir -p /opt/app/nginx",
              "curl -fsSL -H '\''Authorization: token ${{ secrets.GH_PAT }}'\'' -H '\''Accept: application/vnd.github.v3.raw'\'' https://api.github.com/repos/undercontroll-inc/infra/contents/nginx/backend.conf -o /opt/app/nginx/backend.conf",
              "docker compose --env-file /opt/app/.env -f /opt/app/docker-compose.yml pull notification-service",
              "docker compose --env-file /opt/app/.env -f /opt/app/docker-compose.yml up -d notification-service",
              "docker image prune -f"
            ]' \
            --region "$REGION" \
            --query "Command.CommandId" --output text)

          echo "Sent SSM command: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$REGION"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$REGION" \
            --query "Status" --output text)

          STDOUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$REGION" \
            --query "StandardOutputContent" --output text)

          STDERR=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$REGION" \
            --query "StandardErrorContent" --output text)

          echo "SSM invocation status: $STATUS"
          echo "----- STDOUT -----"
          echo "$STDOUT"
          echo "----- STDERR -----"
          echo "$STDERR"

          if [ "$STATUS" != "Success" ]; then
            echo "SSM command did not succeed (status: $STATUS)" >&2
            exit 1
          fi
