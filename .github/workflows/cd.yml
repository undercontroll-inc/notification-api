name: CD - Main Branch

on:
  workflow_run:
    workflows: ["CI/CD - Main Branch"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: notification-api-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
    permissions:
      contents: read
      packages: write
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/undercontroll-inc/notification-api:latest
            ghcr.io/undercontroll-inc/notification-api:${{ env.IMAGE_TAG }}

  deploy:
    name: Deploy to EC2 (via bastion)
    needs: publish
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}

      - name: Copy docker compose file
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ vars.NOTIFICATION_EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.DEPLOY_PRIVATE_KEY }}
          proxy_host: ${{ vars.BASTION_HOST }}
          proxy_username: ${{ secrets.EC2_USERNAME }}
          proxy_key: ${{ secrets.DEPLOY_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/app"

      - name: Deploy via SSH jump
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_OWNER: ${{ github.repository_owner }}
          RABBITMQ_HOST: ${{ vars.RABBITMQ_HOST != '' && vars.RABBITMQ_HOST || secrets.RABBITMQ_HOST }}
          RABBITMQ_USER: ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        with:
          host: ${{ vars.NOTIFICATION_EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.DEPLOY_PRIVATE_KEY }}
          proxy_host: ${{ vars.BASTION_HOST }}
          proxy_username: ${{ secrets.EC2_USERNAME }}
          proxy_key: ${{ secrets.DEPLOY_PRIVATE_KEY }}
          envs: IMAGE_TAG,GH_TOKEN,GH_PAT,GH_OWNER,RABBITMQ_HOST,RABBITMQ_USER,RABBITMQ_PASSWORD,MAIL_HOST,MAIL_PORT,MAIL_USERNAME,MAIL_PASSWORD
          script: |
            set -euo pipefail

            docker logout ghcr.io || true
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_OWNER" --password-stdin

            mkdir -p /opt/app
            cat > /opt/app/.env <<EOF
            RABBITMQ_HOST=${RABBITMQ_HOST}
            RABBITMQ_USER=${RABBITMQ_USER}
            RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
            MAIL_HOST=${MAIL_HOST}
            MAIL_PORT=${MAIL_PORT}
            MAIL_USERNAME=${MAIL_USERNAME}
            MAIL_PASSWORD=${MAIL_PASSWORD}
            EOF
            chmod 600 /opt/app/.env

            mv /opt/app/docker-compose.prod.yml /opt/app/docker-compose.yml

            docker compose --env-file /opt/app/.env -f /opt/app/docker-compose.yml pull notification-service
            docker compose --env-file /opt/app/.env -f /opt/app/docker-compose.yml up -d notification-service
            docker image prune -f

      - name: Smoke test
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.NOTIFICATION_EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.DEPLOY_PRIVATE_KEY }}
          proxy_host: ${{ vars.BASTION_HOST }}
          proxy_username: ${{ secrets.EC2_USERNAME }}
          proxy_key: ${{ secrets.DEPLOY_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            for i in $(seq 1 20); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' notification-service 2>/dev/null || echo "missing")
              if [ "$STATUS" = "healthy" ]; then echo "notification-service healthy"; exit 0; fi
              echo "attempt $i: status=${STATUS}, sleeping 5s"; sleep 5
            done
            docker logs --tail 100 notification-service || true
            echo "notification-service not healthy after 100s" >&2; exit 1
