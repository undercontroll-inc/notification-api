name: CD - Main Branch

on:
  workflow_run:
    workflows: ["CI/CD - Main Branch"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/undercontroll-inc/notification-api:latest
            ghcr.io/undercontroll-inc/notification-api:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4a
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.BACKEND_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --region us-east-1 \
            --comment "Deploy notification-api ${{ github.sha }}" \
            --timeout-seconds 300 \
            --parameters 'commands=[
              "set -e",
              "echo ${{ secrets.GH_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin",
              "mkdir -p /opt/app",
              "cat > /opt/app/.env << '\''EOF'\''",
              "RABBITMQ_HOST=${{ secrets.RABBITMQ_HOST }}",
              "RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}",
              "RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}",
              "MAIL_HOST=${{ secrets.MAIL_HOST }}",
              "MAIL_PORT=${{ secrets.MAIL_PORT }}",
              "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}",
              "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}",
              "EOF",
              "chmod 600 /opt/app/.env",
              "curl -fsSL -H '\''Authorization: token ${{ secrets.GH_PAT }}'\'' -H '\''Accept: application/vnd.github.v3.raw'\'' https://api.github.com/repos/undercontroll-inc/infra/contents/docker-compose.prod.yml -o /opt/app/docker-compose.yml",
              "docker compose -f /opt/app/docker-compose.yml pull notification-service",
              "docker compose -f /opt/app/docker-compose.yml up -d notification-service",
              "docker image prune -f"
            ]' \
            --wait
